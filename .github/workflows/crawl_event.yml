name: 이벤트 크롤러 (FCM 테스트)

on:
  schedule:
    - cron: '17 * * * *'  # 매시간 17분 (UTC)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Firebase 키 파일 생성
        run: echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json

      - name: 이벤트 크롤러 실행
        run: python main_event.py
